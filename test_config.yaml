# Pipeline Parameters
pipeline:
  threads: "auto"

# DADA2 Parameters (300bp Paired-end)
dada2:
  trim_left_f: 0
  trunc_len_f: 150
  trim_left_r: 0
  trunc_len_r: 150
  trunc_q: 2

# Diversity Parameters
diversity:
  sampling_depth: 100
  alpha_max_depth: 10000

# Reference Database (QIIME2 2026.4 호환)
database:
  choice: "silva" # "silva" 또는 "greengenes2"
  silva_classifier_url: "https://data.qiime2.org/2024.10/common/silva-138-99-nb-classifier.qza"
  gg2_classifier_url: "https://data.qiime2.org/2024.10/common/gg2-2022.10-nb-classifier.qza"
