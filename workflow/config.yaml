# Pipeline Parameters
pipeline:
  threads: "auto"

# DADA2 Parameters (300bp Paired-end)
dada2:
  trim_left_f: 0
  trunc_len_f: 0
  trim_left_r: 0
  trunc_len_r: 0
  trunc_q: 2

# Diversity Parameters
diversity:
  sampling_depth: 10000
  alpha_max_depth: 11000

# Reference Database (QIIME2 2026.4 호환 VSEARCH 기반)
database:
  choice: "silva" # 현재 vsearch 모드에서는 silva가 권장됩니다.
  silva_seqs_url: "https://data.qiime2.org/2024.10/common/silva-138-99-seqs.qza"
  silva_tax_url: "https://data.qiime2.org/2024.10/common/silva-138-99-tax.qza"
